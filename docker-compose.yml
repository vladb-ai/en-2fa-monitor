name: "en-2fa-monitor"
services:
  en-2fa-monitor:
    # Build from this repo. To use a prebuilt image instead, comment out `build`
    # and uncomment `image` below.
    build: .
    # image: ghcr.io/vladb-ai/en-2fa-monitor:4e93a9b
    restart: always
    # The binary reads all config from env vars (clap `env`). Secrets/RPC are
    # interpolated from a `.env` file next to this compose file (copy .env.example).
    environment:
      ETH_RPC_URL: ${ETH_RPC_URL}
      VALIDATOR_ADDRESS: "0xdC26B08F0335b68721F64001C38b05D0BC9B539d"
      CHAIN_ADDRESS: "0x32400084C286CF3E17e7B677ea9583e60a000324"
      SIGNERS: ${SIGNERS}
      NETWORK_NAME: "era-mainnet"
      MIN_BALANCE_ETH: "0.1"
      EXEC_LAG_ALERT: "1"
      STALL_SECS: "10800"
      POLL_INTERVAL_SECS: "120"
      ALERT_COOLDOWN_SECS: "3600"
      HEARTBEAT_SECS: "86400"
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      RUST_LOG: "info"
